name: 🚢 Publish packages

on:
  push:
    branches:
      - main

env:
  HUSKY: 0

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      TAG_BRANCH: ${{ steps.tag_branch.outputs.TAG_BRANCH }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      # Get all branches associated with tag branches
      - name: Get tag branches
        id: tag_branch
        # 1. Get the list of branches ref where this tag exists
        # 2. Remove 'origin/' from that result
        # 3. Put that string in output
        # => We can now use function 'contains(list, item)''
        run: |
          $(git fetch)
          raw=$(git branch -a -r --contains ${{ github.ref_name }})
          TAG_BRANCH=${raw##*/}
          echo "TAG_BRANCH=$TAG_BRANCH" >> $GITHUB_OUTPUT
          echo "Branches where this tag exists : $TAG_BRANCH"

  changeset:
    uses: ./.github/workflows/callable-changeset.yml
    secrets: inherit

  cancel:
    needs: [guard, changeset]
    if: ${{ contains(needs.guard.outputs.TAG_BRANCH, 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: ❌ Fail — no changeset found
        if: ${{ needs.changeset.outputs.exists == 'false' }}
        run: |
          echo "::error::No changeset found. Run 'pnpm changeset add' or 'pnpm changeset add --empty' and commit the generated file."
          exit 1
      - name: 🛑 Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.0

  build:
    name: Build
    uses: ./.github/workflows/callable-build.yml
    needs: [cancel]

  test:
    name: Test
    uses: ./.github/workflows/callable-test.yml
    needs: [cancel]

  release:
    name: 📦 Publish packages
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: 📡 Setup
        uses: ./.github/setup

      - name: 🧼 Clean workspace
        run: git restore . && git fetch --tags

      - name: Restore build
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            **/*/dist
            **/*/storybook-static
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Build project
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: pnpm -r build

      - name: 🟠 Set npm token and registry
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc

      - name: 🛸 Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🔖 Version packages
        run: pnpm changeset version

      - name: 👏 Publish packages
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version changes
        run: |
          git add .
          git commit -m "chore: version packages [skip ci]" --allow-empty
          git push

  deploy:
    name: Deploy
    uses: ./.github/workflows/callable-deployment.yml
    needs: [release]
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
