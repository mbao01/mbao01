name: 👷 Build, 🩺 Tests and 🛀 Lint

on:
  push:
    branches-ignore:
      - main

jobs:
  changeset:
    uses: ./.github/workflows/callable-changeset.yml
    secrets: inherit

  cancel:
    needs: [changeset]
    if: |
      needs.changeset.outputs.exists == 'true' ||
      needs.changeset.outputs.skip == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.0

  build:
    uses: ./.github/workflows/callable-build.yml
    needs: [cancel]

  test:
    uses: ./.github/workflows/callable-test.yml
    needs: [cancel]
